<style>
  :root { --blau:#4a90d9; --blaudk:#1c5a96; --rot:#d9534f; --rotdk:#9c2b27;
          --gruen:#1a7d33; --bg:#f4f4f4; --karte:#fff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:"Segoe UI",system-ui,sans-serif; background:var(--bg); color:#222; }

           touch-action:none; cursor:grab; display:block; }

<body>
<div class="wrap">
  <div class="panel inputs">
    <h1>Schnitt zweier Ebenen</h1>
    <div class="eq-title e1">E1:  x = P + s·a + t·b</div>

    <div class="vrow"><label>c (Richtung 1)</label><input id="c0"><input id="c1"><input id="c2"></div>

<script>
"use strict";

/* ---------- exakte Bruchrechnung (BigInt) ---------- */
function bgcd(a,b){ a=a<0n?-a:a; b=b<0n?-b:b; while(b){ [a,b]=[b,a%b]; } return a; }
class Frac {
  constructor(n, d=1n){
    if(d===0n) throw new Error("div0");
    if(d<0n){ n=-n; d=-d; }
    const g = bgcd(n,d) || 1n;
    this.n = n/g; this.d = d/g;
  }
  static parse(str){
    let s = String(str).trim().replace(/\s+/g,"");
    if(s==="") throw new Error("leer");
    if(s.includes("/")){ const [a,b]=s.split("/"); return Frac.dec(a).div(Frac.dec(b)); }
    return Frac.dec(s);
  }
  static dec(s){
    s = s.replace(",", ".");
    let neg = s.startsWith("-"); if(neg||s.startsWith("+")) s=s.slice(1);
    if(s==="") throw new Error("leer");
    if(s.includes(".")){ const [i,f]=s.split("."); const num=BigInt((i||"0")+(f||""));
      const den=10n**BigInt((f||"").length); return new Frac(neg?-num:num, den); }
    const num=BigInt(s); return new Frac(neg?-num:num, 1n);
  }
  add(o){ return new Frac(this.n*o.d + o.n*this.d, this.d*o.d); }
  sub(o){ return new Frac(this.n*o.d - o.n*this.d, this.d*o.d); }
  mul(o){ return new Frac(this.n*o.n, this.d*o.d); }
  div(o){ return new Frac(this.n*o.d, this.d*o.n); }
  neg(){ return new Frac(-this.n, this.d); }
  isZero(){ return this.n===0n; }
  eq(o){ return this.n===o.n && this.d===o.d; }
  gt0(){ return this.n>0n; }
  num(){ return Number(this.n)/Number(this.d); }
  toString(){ return this.d===1n ? this.n.toString() : `${this.n}/${this.d}`; }
}
const F0 = new Frac(0n), F1 = new Frac(1n);
const Fi = (x)=> new Frac(BigInt(x));

/* ---------- Formatierung (LaTeX) ---------- */
const fmt = f => f.toString();
// Bruch/Ganzzahl als LaTeX-Term
function tex(f){
  if(f.d===1n) return f.n.toString();
  const neg = f.n<0n;
  const n = (neg?-f.n:f.n).toString();
  return (neg?"-":"") + `\\tfrac{${n}}{${f.d}}`;
}
// Spaltenvektor
const texVec = v => `\\begin{pmatrix} ${v.map(tex).join(" \\\\ ")} \\end{pmatrix}`;
// augmentierte Matrix mit Spaltenkoepfen s t u v | rhs (fertiger Display-Block)
function fmtMatrix(M){
  const body = M.map(r=>r.map(tex).join(" & ")).join(" \\\\ ");
  return "\\[\\left[\\begin{array}{cccc|c} s & t & u & v & \\\\ \\hline "
       + body + " \\end{array}\\right]\\]";
}
function multerm(k, name, lead=false){
  let s;
  if(k.eq(F1)) s=name;
  else if(k.eq(F1.neg())) s="-"+name;
  else s=`${fmt(k)}·${name}`;
  if(lead) return (k.gt0()? "+ ":"- ") + (s.startsWith("-")?s.slice(1):s);
  return s;
}
// e=[const, Faktor vor der freien Variable] -> LaTeX, z.B. "3 + 3v" oder "-\tfrac{1}{2}v"
function exprStr(e, name="r"){
  const [cst,r]=e;
  if(r.isZero()) return tex(cst);
  const ra = r.gt0()? r : r.neg();
  const rmag = ra.eq(F1) ? name : `${tex(ra)}${name}`;
  if(cst.isZero()) return (r.gt0()?"":"-")+rmag;
  return `${tex(cst)} ${r.gt0()?"+":"-"} ${rmag}`;
}
// Ebenengleichung als LaTeX-Term (ohne Delimiter)
function texPlane(name,p,dirs,params){
  let s = `${name}:\\quad \\vec{x} = ${texVec(p)}`;
  dirs.forEach((dv,i)=> s += ` + ${params[i]}\\,${texVec(dv)}`);
  return s;
}

/* ---------- Vektor-Helfer ---------- */
function rowGcd(row){ // ggT, 0 falls nicht ganzzahlig
  let g=0n;
  for(const x of row){ if(x.d!==1n) return 0n; g=bgcd(g, x.n<0n?-x.n:x.n); }
  return g;
}
function cleanDir(v){
  let L=1n; for(const x of v) L = L/bgcd(L,x.d)*x.d;
  let ints = v.map(x=> x.n*(L/x.d));
  let g=0n; for(const n of ints) g=bgcd(g, n<0n?-n:n);
  if(g>0n) ints=ints.map(n=>n/g);
  for(const n of ints){ if(n!==0n){ if(n<0n) ints=ints.map(m=>-m); break; } }
  return ints.map(n=>new Frac(n,1n));
}

/* ---------- Löser mit Protokoll ---------- */
function solve(P,a,b,Q,c,d){
  const steps=[]; const add=(kind,text)=>steps.push({kind,text});
  const geo={type:"none", planes:{P,a,b,Q,c,d}};

  add("head","Aufgabe");
  add("text",`\\[${texPlane("E_1",P,[a,b],["s","t"])}\\]`+
             `\\[${texPlane("E_2",Q,[c,d],["u","v"])}\\]`);
  add("head","Schritt 1 – Ebenen gleichsetzen");
  add("text","\\[P + s\\,\\vec a + t\\,\\vec b = Q + u\\,\\vec c + v\\,\\vec d\\]"+
             "Unbekannte nach links, Konstanten nach rechts:\n"+
             "\\[s\\,\\vec a + t\\,\\vec b - u\\,\\vec c - v\\,\\vec d = Q - P\\]");

  let M=[0,1,2].map(i=>[a[i],b[i],c[i].neg(),d[i].neg(),Q[i].sub(P[i])]);
  add("head","Schritt 2 – Gleichungssystem (3 Gleichungen, Unbekannte s,t,u,v)");
  add("text","Spalten = Koeffizienten von s, t, u, v ; rechts die Konstante:");
  add("mat",fmtMatrix(M));

  add("head","Schritt 3 – Variablen eliminieren (Additionsverfahren)");
  add("text","Wir kombinieren ganze Gleichungen, sodass je eine Variable wegfällt.\n"+
             "Nur ganzzahlige Vielfache, kein Teilen.");

  const names=["s","t","u","v"]; const lead=[]; let srow=0;
  for(let col=0; col<4; col++){
    let r=-1; for(let i=srow;i<3;i++){ if(!M[i][col].isZero()){ r=i; break; } }
    if(r<0) continue;
    if(r!==srow){ [M[srow],M[r]]=[M[r],M[srow]];
      add("text",`Gl.${srow+1} und Gl.${r+1} tauschen, damit '${names[col]}' in Gl.${srow+1} vorkommt:`);
      add("mat",fmtMatrix(M)); }
    for(let i=srow+1;i<3;i++){
      if(!M[i][col].isZero()){
        const n=M[srow][col], m=M[i][col];
        M[i]=M[i].map((x,k)=> n.mul(M[i][k]).sub(m.mul(M[srow][k])));
        add("text",`Gl.${i+1} := ${multerm(n,`Gl.${i+1}`)} ${multerm(m.neg(),`Gl.${srow+1}`,true)}   => '${names[col]}' fällt weg`);
        const g=rowGcd(M[i]);
        if(g>1n){ M[i]=M[i].map(x=>x.div(new Frac(g,1n))); add("text",`Gl.${i+1} durch ${g} kürzen.`); }
        add("mat",fmtMatrix(M));
      }
    }
    lead.push([col,srow]); srow++; if(srow===3) break;
  }
  for(let i=0;i<3;i++){
    if(M[i].slice(0,4).every(x=>x.isZero()) && !M[i][4].isZero()){
      return {steps,geo}; // ponytail: endet an Stufenform, Deutung den SuS überlassen
    }
  }

  const leadCols=lead.map(x=>x[0]);
  const free=[0,1,2,3].filter(j=>!leadCols.includes(j));
  let freeName="r"; // im Geraden-Fall der Name der freien Variable (z.B. "v")

  function backSub(){
    const sol={}; for(const j of free) sol[j]=[F0,F1];
    for(let k=lead.length-1;k>=0;k--){
      const [col,row]=lead[k]; const pv=M[row][col];
      let acc=[M[row][4],F0];
      for(let j=0;j<4;j++){ if(j!==col && !M[row][j].isZero()){
        const xj=sol[j]; acc=[acc[0].sub(M[row][j].mul(xj[0])), acc[1].sub(M[row][j].mul(xj[1]))]; } }
      sol[col]=[acc[0].div(pv), acc[1].div(pv)];
      add("text",`Gl.${row+1} nach \\(${names[col]}\\) auflösen:  \\(${names[col]} = ${exprStr(sol[col],freeName)}\\)`);
    }
    return [0,1,2,3].map(j=>sol[j]);
  }

  if(free.length===0){
    add("head","Schritt 4 – rückwärts einsetzen");
    const sol=backSub(); const s0=sol[0][0], t0=sol[1][0];
    const pt=[0,1,2].map(i=>P[i].add(s0.mul(a[i])).add(t0.mul(b[i])));
    geo.type="point"; geo.point=pt.map(x=>x.num());
    return {steps,geo};
  }
  if(free.length>=2){
    geo.type="plane"; return {steps,geo}; // ponytail: Deutung den SuS überlassen
  }

  const fv=free[0];
  freeName=names[fv];
  const [bcol,brow]=lead[lead.length-1]; // unterste Leitgleichung
  add("head","Schritt 4 – rückwärts einsetzen");
  add("text",`In Gl.${brow+1} steht jetzt eine Gleichung mit nur noch zwei Variablen (\\(${names[bcol]}\\) und \\(${freeName}\\)).\n`+
             `Wir bestimmen \\(${names[bcol]}\\) in Abhängigkeit von \\(${freeName}\\) und setzen dann nach oben ein.`);
  const sol=backSub();
  add("text","Zusammengefasst:\n"+
             "\\[\\begin{aligned} "+
             [0,1,2,3].map(j=> j===fv ? `${names[j]} &\\ \\text{frei wählbar}`
                                      : `${names[j]} &= ${exprStr(sol[j],freeName)}`).join(" \\\\ ")+
             " \\end{aligned}\\]");
  const stuetz=[0,1,2].map(i=>P[i].add(sol[0][0].mul(a[i])).add(sol[1][0].mul(b[i])));
  const richtung=[0,1,2].map(i=>sol[0][1].mul(a[i]).add(sol[1][1].mul(b[i])));
  const rc=cleanDir(richtung);
  geo.type="line"; geo.stuetz=stuetz.map(x=>x.num()); geo.richtung=rc.map(x=>x.num());
  return {steps,geo};
}

/* ---------- UI ---------- */
const $=id=>document.getElementById(id);
function typeset(el){
  if(window.MathJax && window.MathJax.typesetPromise){
    if(window.MathJax.typesetClear) window.MathJax.typesetClear([el]);
    window.MathJax.typesetPromise([el]).then(()=>{ el.scrollTop=el.scrollHeight; })
      .catch(()=>{});
  }
}
const keys=["P","a","b","Q","c","d"];
// Hier kannst du deine drei festen Aufgaben/Preset-Werte vorab einstellen.
// Jeder Vektor besteht aus drei Einträgen; Brüche als String wie "1/2" sind möglich.
const PRESETS = [
  {name:"Aufgabe 1", P:[1,1,-1], a:[1,0,2],  b:[0,2,0],  Q:[0,-1,1], c:[-1,2,-1], d:[-1,4,2]},
  {name:"Aufgabe 2", P:[4,1,4],  a:[2,1,0],  b:[-1,0,3], Q:[2,0,4],  c:[1,1,3],   d:[5,2,-3]},
  {name:"Aufgabe 3", P:[-1,2,2], a:[1,0,-2], b:[2,-1,3], Q:[3,-1,-2],c:[3,-1,1],  d:[1,-1,5]}
];
function readVec(k){ return [0,1,2].map(i=>Frac.parse($(k+i).value)); }
function loadPreset(index){
  const ex=PRESETS[index];
  if(!ex) return;
  for(const k of keys) ex[k].forEach((v,i)=> $(k+i).value=v);
  document.querySelectorAll(".presetBtn").forEach(btn=>{
    btn.classList.toggle("active", Number(btn.dataset.preset)===index);
  });
  doSolve();
}
function setEx(){
  loadPreset(0);
}

const state={groups:[],shown:0,geo:null};

// Eine Überschrift wird zusammen mit ihrem folgenden Erklärtext als ein Schritt aufgedeckt.
function groupSteps(steps){
  const g=[];
  for(let i=0;i<steps.length;i++){
    if(steps[i].kind==="head" && steps[i+1] && steps[i+1].kind==="text"){ g.push([steps[i],steps[i+1]]); i++; }
    else g.push([steps[i]]);
  }
  return g;
}
function render(){
  const el=$("steps"); el.innerHTML="";
  const n=state.groups.length;
  state.groups.slice(0,state.shown).flat().forEach(s=>{
    const div=document.createElement("div");
    div.className = s.kind==="head"?"s-head":s.kind==="mat"?"s-mat":s.kind==="res"?"s-res":"s-text";
    if(s.kind==="head") div.textContent=s.text; else div.innerHTML=s.text;
    el.appendChild(div);
  });
  typeset(el);
  el.scrollTop=el.scrollHeight;
  const done=state.shown>=n;
  $("tab3d").classList.toggle("hidden", !done); // 3D-Tab erst am Ende
  if(!done){ $("tab3d").classList.remove("active"); document.querySelector('.tab[data-tab="steps"]').classList.add("active");
    $("steps").classList.remove("hidden"); $("view3d").classList.add("hidden"); }
  $("nextBtn").disabled=done;
  $("nextBtn").textContent = done? "Fertig ✓" : `Nächster Schritt (${state.shown}/${n})`;
  if(done && state.geo){ geo3d=state.geo; drawGeo(); }
  else { geo3d=null; drawPlaceholder(); }
}
function doSolve(){
  let P,a,b,Q,c,d;
  try{ P=readVec("P");a=readVec("a");b=readVec("b");Q=readVec("Q");c=readVec("c");d=readVec("d"); }
  catch(e){ alert("Bitte alle 18 Felder ausfüllen (z.B. 1, -2, 1/2)."); return; }
  const {steps,geo}=solve(P,a,b,Q,c,d);
  state.groups=groupSteps(steps); state.geo=geo;
  state.shown = $("helpMode").checked ? 0 : state.groups.length;
  render();
}
$("solveBtn").onclick=doSolve;
$("helpMode").onchange=doSolve;
$("nextBtn").onclick=()=>{ if(state.shown<state.groups.length){ state.shown++; render(); } };
document.querySelectorAll(".presetBtn").forEach(btn=>{
  btn.textContent = PRESETS[Number(btn.dataset.preset)]?.name || btn.textContent;
  btn.onclick=()=>loadPreset(Number(btn.dataset.preset));
});

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  const tab=t.dataset.tab;
  $("steps").classList.toggle("hidden", tab!=="steps");
  $("view3d").classList.toggle("hidden", tab!=="view3d");
  if(tab==="view3d") render();
});

/* ---------- 3D: drehbar ---------- */
const cv=$("cv"), ctx=cv.getContext("2d");
let yaw=-0.6, pitch=-0.5, zoom=1, geo3d=null;
const norm=(v,L)=>{ const n=Math.hypot(...v)||1; return v.map(c=>c/n*L); };

function drawPlaceholder(){
  fitCanvas(); ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle="#999"; ctx.font="15px Segoe UI"; ctx.textAlign="center";
  ctx.fillText("3D-Ansicht erscheint, sobald alle Schritte aufgedeckt sind.", cv.width/2, cv.height/2);
}
function fitCanvas(){
  const r=cv.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
  cv.width=r.width*dpr; cv.height=r.height*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  cv._w=r.width; cv._h=r.height;
}
function rot(p){
  let [x,y,z]=p, ca=Math.cos(yaw),sa=Math.sin(yaw);
  let x1=x*ca+z*sa, z1=-x*sa+z*ca, y1=y;
  let cb=Math.cos(pitch),sb=Math.sin(pitch);
  return [x1, y1*cb - z1*sb, y1*sb + z1*cb];
}
function drawGeo(){
  if(!geo3d){ drawPlaceholder(); return; }
  fitCanvas();
  const W=cv._w, H=cv._h;
  ctx.clearRect(0,0,W,H);
  const {P,a,b,Q,c,d}=geo3d.planes;
  const fl=v=>v.map(x=>x.num());
  const Pf=fl(P),af=fl(a),bf=fl(b),Qf=fl(Q),cf=fl(c),df=fl(d);
  const S=4;
  const corners=(m,d1,d2)=>{ const u1=norm(d1,S),u2=norm(d2,S);
    return [[-1,-1],[1,-1],[1,1],[-1,1]].map(([i,j])=>m.map((_,k)=>m[k]+i*u1[k]+j*u2[k])); };
  let f1,f2;
  if(geo3d.type==="line"){ f1=f2=geo3d.stuetz; }
  else if(geo3d.type==="point"){ f1=f2=geo3d.point; }
  else { f1=Pf; f2=Qf; }
  const poly1=corners(f1,af,bf), poly2=corners(f2,cf,df);
  let pts=[...poly1,...poly2], line=null;
  if(geo3d.type==="line"){ const dn=norm(geo3d.richtung,S+1.5), s=geo3d.stuetz;
    line=[s.map((_,k)=>s[k]-dn[k]), s.map((_,k)=>s[k]+dn[k])]; pts=pts.concat(line); }
  else if(geo3d.type==="point"){ pts.push(geo3d.point); }

  // Schwerpunkt als Drehzentrum
  const ctr=[0,1,2].map(k=> pts.reduce((s,p)=>s+p[k],0)/pts.length);
  const R=p=> rot(p.map((_,k)=>p[k]-ctr[k]));
  const rp=pts.map(R);
  const xs=rp.map(p=>p[0]), ys=rp.map(p=>-p[1]);
  const minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);
  const m=30, k=Math.min((W-2*m)/((maxx-minx)||1),(H-2*m)/((maxy-miny)||1))*zoom;
  const cx=W/2, cy=H/2, mx=(minx+maxx)/2, my=(miny+maxy)/2;
  const proj=p=>{ const q=R(p); return [cx+(q[0]-mx)*k, cy+(-q[1]-my)*k]; };
  const meanZ=poly=>poly.reduce((s,p)=>s+R(p)[2],0)/poly.length;

  const planes=[{poly:poly1,fill:"rgba(74,144,217,.5)",stroke:"#1c5a96"},
                {poly:poly2,fill:"rgba(217,83,79,.5)",stroke:"#9c2b27"}];
  planes.sort((A,B)=>meanZ(B.poly)-meanZ(A.poly)); // hinten zuerst
  for(const pl of planes){
    ctx.beginPath();
    pl.poly.forEach((p,i)=>{ const [x,y]=proj(p); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
    ctx.closePath(); ctx.fillStyle=pl.fill; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle=pl.stroke; ctx.stroke();
  }
  if(line){
    const [x1,y1]=proj(line[0]), [x2,y2]=proj(line[1]);
    ctx.lineCap="round";
    ctx.strokeStyle="#fff"; ctx.lineWidth=7; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.strokeStyle="#1a7d33"; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    const [sx,sy]=proj(geo3d.stuetz);
    ctx.fillStyle="#1a7d33"; ctx.beginPath(); ctx.arc(sx,sy,5,0,7); ctx.fill();
    ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke();
  } else if(geo3d.type==="point"){
    const [sx,sy]=proj(geo3d.point);
    ctx.fillStyle="#f0ad4e"; ctx.beginPath(); ctx.arc(sx,sy,7,0,7); ctx.fill();
    ctx.strokeStyle="#9c6a13"; ctx.lineWidth=2; ctx.stroke();
  }
  // Legende
  const leg=[["#4a90d9","E1"],["#d9534f","E2"]];
  if(geo3d.type==="line") leg.push(["#1a7d33","Schnittgerade g"]);
  else if(geo3d.type==="point") leg.push(["#f0ad4e","Schnittpunkt"]);
  else if(geo3d.type==="plane") leg.push(["#888","Ebenen identisch"]);
  else leg.push(["#888","kein Schnitt (parallel)"]);
  ctx.textAlign="left"; ctx.font="13px Segoe UI";
  leg.forEach(([col,lab],i)=>{ const y=14+i*20;
    ctx.fillStyle=col; ctx.fillRect(12,y,16,12);
    ctx.fillStyle="#222"; ctx.fillText(lab,34,y+11); });
}

/* Maus / Touch */
let drag=null;
cv.addEventListener("pointerdown",e=>{ drag={x:e.clientX,y:e.clientY}; cv.classList.add("grabbing");
  cv.setPointerCapture(e.pointerId); });
cv.addEventListener("pointermove",e=>{ if(!drag) return;
  yaw += (e.clientX-drag.x)*0.01; pitch += (e.clientY-drag.y)*0.01;
  pitch=Math.max(-1.5,Math.min(1.5,pitch)); drag={x:e.clientX,y:e.clientY};
  if(geo3d) drawGeo(); });
cv.addEventListener("pointerup",()=>{ drag=null; cv.classList.remove("grabbing"); });
cv.addEventListener("wheel",e=>{ e.preventDefault(); zoom*=Math.exp(-e.deltaY*0.001);
  zoom=Math.max(0.3,Math.min(4,zoom)); if(geo3d) drawGeo(); }, {passive:false});
window.addEventListener("resize",()=>{ if($("view3d").classList.contains("hidden")) return;
  geo3d?drawGeo():drawPlaceholder(); });

setEx();
</script>
