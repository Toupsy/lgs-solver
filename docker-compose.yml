services:
  lgs-solver:
    # Portainer-Web-Editor hat keinen lokalen Dockerfile-Kontext.
    # Darum wird der Build-Kontext explizit aus GitHub geladen.
    build:
      context: https://github.com/Toupsy/lgs-solver.git#main
      dockerfile: Dockerfile
    image: lgs-solver
    container_name: lgs-solver
    ports:
      - "1913:80"        # Host-Port 1913 -> hier anpassen, falls belegt
    restart: unless-stopped
